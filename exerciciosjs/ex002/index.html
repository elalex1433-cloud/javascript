<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hora</title>
    <style>
        body{
           
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        box-sizing: border-box;
        text-align: center;
        }
        main{
            width: 500px;
            height: 400px;
            padding: 10px;
           border-radius: 20px;
           margin: auto;
           text-align: center;
            background-color: white;
         box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.418);
        }
        img#foto{
         
            width: 300px;
           aspect-ratio: 1/1;
          object-fit: cover;
          overflow: hidden;
          margin: auto;  
         
      justify-content: center;
     align-items: center;
          border-radius: 50% ;
        }
        .mensagem{
            font-size: 3em;
        }
    </style>
</head>
<body>
   <header><h1>Hora do Dia</h1></header>
   <main>
    <article>
      <h2 id="mensagem"></h2>
        <img id="foto" src="" alt="imagem do periodo do dia">
    
    </article>
   </main>
   <script>
    const hora =  new Date(). getHours();;
    let periodo = "";
    let corFundo = "";

    let imagem ="";
    periodo = "da Manhã"
    if(hora >= 6 && hora < 12 ){
     corFundo = "#dbeafe";
    imagem = "imagens/foto-dia-01 (1).webp"
    }
    else if (hora >= 12 && hora <18){
        periodo = "da Tarde "
        imagem ="imagens/foto-tarde-02.webp"
        corFundo = `#fef3c7`
    }
    else if(hora >= 19 && hora <24){
        periodo = "da Noite"
        imagem = "imagens/foto-noite-04.webp"
        corFundo = `#1e2936`
    }
    else {
        periodo = "da madrugada"
        imagem = "imagens/foto-04-madrugada.webp"
        corFundo = `#020617`
    }
    document.body.style.backgroundColor = corFundo
    document.getElementById("mensagem").innerText = `Agora são ${hora} horas ${periodo}`
    document.getElementById("foto").src = imagem;

   </script>
 
</body>
</html>
