<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idade</title>
    <style>
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: rgba(19, 19, 228, 0.795);
            
        }
        header h1{
            color: white;
            text-align: center;
            text-shadow: 2px 2px rgba(0, 0, 0, 0.795);
        }
        main{
            display: block;
            padding-top: 10px;
            padding-left: 10px;
            background-color: white;
            border-radius: 20px;
            margin: auto;
            text-align: left;
            width: 600px;
            height:500px ;
        }
        main h2{
            text-align: center;
        }
        
        img{
            display: block;
            overflow: hidden;
            width: 280px;
            height: 280px;
            border-radius: 51%;
            margin-top: 20px;
          margin: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <main>
      
    <p>Ano de Nascimento: <input  type="number" name="idade" id="ano" ></p>
       <p>
           Sexo:
           <input type="radio" name="sexo" >Masculino
           <input type="radio" name="sexo">Ferminino
       </p>
       <br>
        <input type="button" value="Verificar" onclick="verificar()">

        <h2 id="res"></h2>
      <img src=""  id="foto">
    </main>
      

    <script>
        function verificar(){
            let campoAno = document.getElementById("ano")
            let ano = campoAno.value
            let res = document.getElementById("res")
            let foto = document.getElementById("foto")
            let sexo = document.getElementsByName("sexo")

            let anoAtual = new Date().getFullYear()

            if (ano.length == 0 || Number(ano) > anoAtual ){
                res.innerHTML = "Preencha o ano corretamente!"
                foto.src = ""
                return
            }
            let idade = anoAtual - Number(ano)
            let genero = ""

            if(sexo[0].checked){
              genero = "Homem"  
              foto.src ="images/homem.webp"
            }
            else if (sexo[1].checked){
               genero = "Mulher"
               foto.src = "images/mulher.webp"
            } else{
                res.innerHTML ="Selecione o sexo"
                foto.src = ""
                return
            }
            res.innerHTML = `Você é ${genero} e tem ${idade} anos`

        }

    </script>
   
</body>
</html>
